<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1749c6" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Unlock First Look</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/login.css?v=20260704" />
    <script src="/login.js?v=20260704" defer></script>
  </head>
  <body>
    <main class="login-shell">
      <header class="login-brand">
        <span class="login-mark" aria-hidden="true">FL</span>
        <span>
          <strong>First Look</strong>
          <small>NYC rental watch</small>
        </span>
      </header>

      <section class="login-panel" aria-labelledby="login-title">
        <div class="live-signal">
          <span aria-hidden="true"></span>
          Private rental feed
        </div>
        <h1 id="login-title">Unlock your first look.</h1>
        <p class="login-intro">
          Enter your access password to scan the newest matching rentals.
        </p>

        <form id="login-form">
          <label for="password">Access password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            autofocus
          />
          <button type="submit">
            <span>Open rental watch</span>
            <span aria-hidden="true">→</span>
          </button>
          <p class="login-error" id="login-error" role="alert" hidden></p>
        </form>

        <p class="device-note">
          This device stays unlocked for 30 days.
        </p>
      </section>
    </main>
  </body>
</html>
